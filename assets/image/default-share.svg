<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a5cad;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="80" fill="rgba(255,255,255,0.05)"/>
  <circle cx="1100" cy="530" r="120" fill="rgba(255,255,255,0.05)"/>
  
  <!-- Main text -->
  <text x="600" y="250" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle" filter="url(#shadow)">
    iamteppei
  </text>
  
  <!-- Tagline -->
  <text x="600" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="42" fill="rgba(255,255,255,0.85)" text-anchor="middle" font-weight="300">
    Do one thing and do it well!
  </text>
  
  <!-- Decorative line -->
  <line x1="300" y1="380" x2="900" y2="380" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  
  <!-- URL -->
  <text x="600" y="520" font-family="monospace" font-size="28" fill="rgba(255,255,255,0.7)" text-anchor="middle">
    iamteppei.github.io
  </text>
</svg>